name: Run Tests

on:
  # PIPELINE BUG 1: 'pushh' is a typo -- not a valid GitHub Actions event.
  # The workflow will never trigger on push.
  pushh:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # PIPELINE BUG 2: Missing actions/checkout step entirely.
      # The runner has no code to work with -- all subsequent steps will fail
      # because the repo files do not exist in the working directory.

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest pytest-cov

      - name: Run tests
        run: |
          # PIPELINE BUG 3: Wrong test path -- 'test/' does not exist.
          # The correct directory is 'tests/' (with an s).
          pytest test/ --cov=src --cov-report=term-missing
